// 1. What is the worst case complexity of the following function?

function hasDuplicates(arr) {
  for (var i = 0; i < arr.length; i++) {
    for (var j = 0; j < arr.length; j++) {
      if (i !== j && arr[i] === arr[j]) {
        return true;
      }
    }
  }
  return false;
}

console.log(hasDuplicates([1, 4, 2, 5, 6, 1, 8, 2]));

// The worst case for this function in O(n^2) as the nested for loops cause a second run of iteration for each first iteration.

// 2. Implement a faster version of the same function and analyze the

function hasDuplicatesFast(arr) {                  //This function has the worst complexity of O(n).
  for (var i = 0; i < arr.length; i++) {
    if (arr.indexOf(arr[i]) !== i) {
      console.log(arr[i] + " Is a duplicate");
    }
  }
}

function Dictionary() {
  var items = {};

  this.set = function(key, value) {
    items[key] = value;
  };

  this.delete = function(key) {
    if (items.has(key)) {
    delete items[key];
    return true;
    }
    return false;
  };

  this.has = function(key) {
    return key in items;
  };

  this.get = function(key) {
    return this.has(key) ? items[key] : undefined;
  };

  this.clear = function() {
     items = {};
  };

  this.size = function() {
    var count = 0;
    for (var key in items) {
      if (items.hasOwnProperty(key)) {
        ++count;
      }
    }
    return count;
  };

  this.keys = function() {
    return Object.keys(items);
  };

  this.values = function() {
    var values = [];

    for (var k in items) {
      if (this.has(k)) {
        values.push(items[k]);
      }
    }
    return values;
  };

  this.getItems = function() {
    return items;
  };
}

function Queue() {
  var items = [];

  this.enqueue = function(element) {
    items.push(element);
  };

  this.dequeue = function() {
    return items.shift();
  };

  this.front = function(element) {
    return items[0];
  };

  this.isEmpty = function() {
    return items.length == 0;
  }

  this.size = function() {
    return items.length;
  }

  this.print = function() {
    console.log(items.toString());
  };
}
