// 1. Implement factorial using a recursive function and test your code.

function factorial(value) {
  if (value <= 1) {
    return 1;
  } else {
  return value * factorial(value - 1);
  }
}

console.log(factorial(4));

// 2. Implement a function that returns the complete fibonacci sequence in an
//    array for a given number.

function fibonacci(num) {
  var fibonacci = [];
  var fibHolder = [];
  fibHolder[1] = 1;
  fibonacci[1] = 1;
  fibonacci[2] = 1;

for(var i = 3; i <= num; i++){
 fibHolder.push(fibonacci[i] = fibonacci[i-1] + fibonacci[i-2]);
}
return fibHolder;
}
console.log(fibonacci(8));

// 3. Implement finding the longest common subsequence using dynamic
//    programming. Test your code.

function LCS(str1, str2) {
  var leng1 = str1.length;
  var leng2 = str2.length;
  var array = [];
  var i, j, a, b;
  var solution = [];

  for (i = 0; i <= leng1; ++i) {
    array[i] = [];
    solution[i] = [];

    for (j = 0; j <= leng2; ++j) {
      array[i][j] = 0;
      solution[i][j] = '0';
    }
  }

  for (i = 0; i < leng1; i++) {
    for (j = 0; j < leng2; j++) {
      if (i == 0 || j == 0) {
          array[i][j] = 0;
      } else if (str1[i-1] == str2[j-1]) {
        array[i][j] = array[i-1][j-1] + 1;
        solution[i][j] = 'diagonal';
      } else {
        a = array[i-1][j];
        b = array[i][j-1];
        array[i][j] = (a > b) ? a : b; 
        solution[i][j] = (array[i][j] == array[i-1][j-1]) ? 'top' : 'left';
      }
    }
  }
  printSolution(solution, array, str1, str2, leng1, leng2);
  return array[leng1][leng2];
}

function printSolution(solution, array, str1, str2, leng1, leng2) {
  var a = leng1, 
  b = leng2, i, j, 
  x = solution[a][b], 
  answer = '';

  while (x !== '0') {
    if (solution[a][b] === 'diagonal') {
      answer = str1[a-1] + answer;
      a--;
      b--;
    } else if (solution[a][b] === 'left') {
      b--;
    } else if (solution[a][b] === 'right') {
      a--;
    }
    x = solution[a][b];
  }
  console.log('LCS: ' + answer);
}

var str11 = 'acbaed';
var str22= 'abcadf';

LCS(str11, str22);

// 4. Solve the problem of summing all the numbers in an array using
//    imperative style.

function summer(array) {
  var sum = 0;
  for (i = 0; i < array.length; i++){
    sum += array[i];
  }
  return sum;
}

var test = [1, 2, 3, 4, 5, 6]
console.log(summer(test));

// 5. Solve the problem of summing all the numbers in an array using
//    functional style.

function functionalSummer(array, action) {
  var sum = 0;
  return action(sum, array);
}

function adder(sum, array) {
  for (i = 0; i < array.length; i++){
    sum += array[i];
  }
  return sum;
}

var test2 = [1, 2, 7, 3, 4, 9, 5]

// 6. Solve problem 14 of Project Euler: https://projecteuler.net/problem=14
//    Note: This may be a bit challenging. Try to get as far as you can.
//          Instead of one million you could use a smaller number for testing.

function Euler(n) {
  var num = 0;
  var count = 1;

  while (n !== 1) {
  if (n % 2 === 0) {
    num = n/2;
  } else if (n % 2 !== 0) {
    num = (n*3) + 1;
  }
  }
  return count;
}
