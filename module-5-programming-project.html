function Node(key) {
  this.key = key;
  this.left = null;
  this.right = null
}

function BinarySearchTree() {
  // the root node
  this.root = null;
}

// helper functions
BinarySearchTree.prototype._insertNode = function(node, newNode) {
  // node is the node we want to insert into
  // newNode is the node we want to insert
  if (newNode.key < node.key) {
    // go to left
    if (node.left === null) {
      // no left node yet so assign
      node.left = newNode;
    }
    else {
      // move down tree and repeat
      this._insertNode(node.left, newNode);
    }
  }
  else {
    // go to right
    if (node.right === null) {
      // no right node yet so assign
      node.right = newNode;
    }
    else {
      // move down tree and repeat
      this._insertNode(node.right, newNode);
    }
  }
}

BinarySearchTree.prototype._removeNode = function(node, key) {
  if (node === null) {
    return null;
  }
  if (key < node.key) {
    node.left = this._removeNode(node.left, key);
    return node;
  } else if (key > node.key) {
    node.right = this._removeNode(node.right, key);
    return node;
  } else {
    if (node.left === null && node.right === null) {
      node = null;
      return node;
    }

    if (node.left === null) {
      node = node.right;
      return node;
    } else if (node.right === null) {
      node = node.left;
      return node;
    }

    var aux = this._findMinNode(node.right);
    node.key = aux.key;
    node.right = this._removeNode(node.right, aux.key);
    return node;
  }
}

BinarySearchTree.prototype._findMinNode = function(node) {
  while (node && node.left !== null) {
    node = node.left;
  }
  return node;
}

BinarySearchTree.prototype.insert = function(key) {
  // insert new key in the tree
  var newNode = new Node(key);
  if (this.root === null) {
    // no nodes yet
    this.root = newNode;
  }
  else {
    // find insert location through insertNode
    this._insertNode(this.root, newNode);
  }
};

BinarySearchTree.prototype.remove = function(key) {
    this.root = this._removeNode(this.root, key)

BinarySearchTree.prototype.search = function(key) {

BinarySearchTree.prototype._searchNode = function(node, key) {
  if (node === null) {
    return false;
  }
  if (key < node.key) {
    return this._searchNode(node.left, key);
  } else if (key > node.key) {
    return this._searchNode(node.right, key);
  } else {
    return true;
  }
}

function Dictionary() {
  var items = {};

  this.set = function(key, value) {
    items[key] = value;
  };

  this.delete = function(key) {
    if (items.has(key)) {
    delete items[key];
    return true;
    }
    return false;
  };

  this.has = function(key) {
    return key in items;
  };

  this.get = function(key) {
    return this.has(key) ? items[key] : undefined;
  };

  this.clear = function() {
     items = {};
  };

  this.size = function() {
    var count = 0;
    for (var key in items) {
      if (items.hasOwnProperty(key)) {
        ++count;
      }
    }
    return count;
  };

  this.keys = function() {
    return Object.keys(items);
  };

  this.values = function() {
    var values = [];

    for (var k in items) {
      if (this.has(k)) {
        values.push(items[k]);
      }
    }
    return values;
  };

  this.getItems = function() {
    return items;
  };
}
