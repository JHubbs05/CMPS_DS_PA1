// 1. Implement the set data structure using the prototype.

function Set() {
  this.items = {};
}

Set.prototype.has = function(value) {
  return this.items.hasOwnProperty(value);
}

Set.prototype.add = function(value) {
  if (!this.has(value)) {
    this.items[value] = value;
    return true;
  }
  return false;
}

Set.prototype.delete = function(value) {
  if (this.has(value)) {
    delete this.items[value];
    return true;
  }
  return false;
}

Set.prototype.clear = function() {
  this.items = {};
}

Set.prototype.size = function() {
  var count = 0;
  for (var key in this.items) {
    if (this.items.hasOwnProperty(key)){
      ++count;
    }
  }
  return count;
}

Set.prototype.values = function() {
  var values = [];
  for (var key in this.items) {
    if (this.items.hasOwnProperty(key)) {
      values.push(this.items[key])
    }
  }
  return values;
}

Set.prototype.union = function(otherSet) {
  var unionSet = new Set();
  var values = this.values();

  for (var i = 0; i < values.length; i++) {
    unionSet.add(values[i]);
  }

  values = otherSet.values();

  for (var i = 0; i < values.length; i++) {
    unionSet.add(values[i]);
  }

  return unionSet;
}

Set.prototype.intersection = function(otherSet) {
  var intersectionSet = new Set();
  var values = this.values();

  for (i = 0; i < values.length; i++) {
    if (otherSet.has(values[i])) {
      intersectionSet.add(values[i]);
    }
  }
  return intersectionSet;
}

Set.prototype.difference = function(otherSet) {
  var differenceSet = new Set();
  var values = this.values();

  for (var i = 0; i < values.length; i++) {
    if (!otherSet.has(values[i])) {
      differenceSet.add(values[i])
    }
  }
  return differenceSet;
}

Set.prototype.subset = function(otherSet) {
  if (this.size() > otherSet.size()) {
    return false;
  } else {
    var values = this.values();

    for (var i = 0; i < values.length; i++) {
      if (!otherSet.has(values[i])) {
        return false;
      }
    }
    return true;
  }
}

// 8. Implement the hashtable data structure using the prototype.

function hashTable() {
this.table = [];
}

hashTable.prototype.loseloseHashCode = function(key) {
  var hash = 0;

  for(var i = 0; i < key.length; i++) {
    hash += key.charCodeAt(i);
  }
  return hash % 37;
}

hashTable.prototype.put = function(key, value) {
  var position = loseloseHashCode(key);

  console.log(position + " - " + key);
  this.table[position] = value;
}

hashTable.prototype.get = function(key) {
  return this.table[loseloseHashCode(key)]
}

hashTable.prototype.remove = function(key) {
  this.table[loseloseHashCode(key)] = undefined;
}

hashTable.prototype.print = function() {
  for (var i = 0; i < this.table.length; i++){
