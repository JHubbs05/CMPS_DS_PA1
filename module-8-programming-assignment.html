// 1. Analyze the complexity of the isPalindrome function below. Make a
//    distinction between best, worst, and average case complexity.

function isPalindrome(str) {
  for (var i = 0; i < str.length/2; i++) {
    if (str[i] !== str[str.length-i-1]) {
      return false;
    }
  }
  return true;
}

// The complexity of the previous function is O(n), as it iterates through the length of str and so it takes as long as it does to go through it. 
// The worst case would be O(n), and average would be O(n) as well, and the best case would be O(1) in the event it is a one long string.

// 2. Write a program that finds the minimum element in a stack in O(1) time
//    complexity. Note that earlier solutions searched through the elements on
//    the stack but that leads to an O(n) solution.
//    NOTE: this question is sometimes asked on interviews.


function Stack() {
  var items = [];

  this.push = function(element) {
    items.push(element);
  }

  this.pop = function(element) {
    return items.pop(element);
  }

  this.peek = function() {
    return items[items.length-1];
  }

  this.empty = function() {
    return items.length == 0;
  }

  this.size = function() {
    return items.length;
  }

  this.clear = function() {
    items = [];
  }

  this.print = function() {
    console.log(items.toString());
  }

  this.findMin = function() {
    return Math.min(...items);
  }
}

var stack = new Stack();
stack.push(9)
stack.push(4)
stack.push(5)
stack.push(8)
stack.push(2)
stack.push(8)

console.log(stack.findMin());

// 1. Solve Project Euler problem 1 (https://projecteuler.net/problem=1).

function eulerP1(num) {
  var sum = 0;
  var numArray = [];
  var j = 1;

  while(j < num) {
    numArray.push(j);
    j++;
  }

  for (var i = 0; i <= numArray.length; i++) {
    if (numArray[i-1] % 3 === 0 || numArray[i-1] % 5 === 0) {
      sum += i;
    }
  }
  return sum;
}

console.log("The sum of all multiples of 3 or 5 below 1000 is: " + eulerP1(1000));
